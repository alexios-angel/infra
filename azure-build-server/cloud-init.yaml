#cloud-config
# Provisioning for the general-purpose devbox (Ubuntu 24.04) shared by ALL
# projects — deliberately PROJECT-AGNOSTIC. House rules:
#  - everything installable via apt comes from apt; third-party repos are
#    declared below, each scoped to its own signed-by keyring (never apt-key)
#  - linuxbrew is bootstrapped but installs NOTHING here: a project that
#    needs a brew-only dep declares it in ITS OWN Brewfile and converges with
#    `brew bundle --file=...` at build time (embed's
#    scripts/build-clang/Brewfile is the model)
#  - every project tree lives under ~/projects/<name>; scratch build trees
#    (e.g. ~/llvm-build, ~/dist) stay in $HOME
#  - the box deallocates ITSELF after 30 min without user activity via
#    devbox-idle-check + the VM's managed identity (no credentials on disk)
# The embedded PGP material is PUBLIC signing keys only — safe to commit.

ssh_pwauth: false

apt:
  sources:
    # cloudflared: Cloudflare's own repo (keyring embedded via write_files)
    cloudflared:
      source: "deb [signed-by=/usr/share/keyrings/cloudflare-main.gpg] https://pkg.cloudflare.com/cloudflared noble main"
    # gh: GitHub's official repo — noble's archive version lags far behind
    github-cli:
      source: "deb [arch=amd64 signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main"
