package_update: true
packages:
  # brew's own prerequisites + rsync so the first sync works regardless
  - build-essential
  - procps
  - curl
  - file
  - git
  - rsync
  - ca-certificates
  - gnupg
  # build toolset (noble's cmake 3.28 matches what the old servers ran)
  - cmake
  - ninja-build
  - pkg-config
  - python3
  - ccache
  - unzip
  - zstd
  - htop
  - xz-utils
  - zip
  # glm lands in /usr/include — clang finds <glm/glm.hpp> with no extra flag
  - libglm-dev
  # LLVM suite (noble's v18; a project wanting newer brews it via Brewfile)
  - clang
  - llvm
  - lld
  - lldb
  - clangd
  - clang-format
  - clang-tidy
  # dev environment
  - cloudflared
  - zsh
  - fastfetch
  - bat
  - neovim
  - ripgrep
  - xsel
  - gh
  # security: sshd brute-force jail + automatic security patches
  - fail2ban
  - unattended-upgrades

write_files:
  # Cloudflare + GitHub CLI apt signing keyrings (binary, hence base64 here
  # rather than inline armored keys under apt.sources)
  - path: /usr/share/keyrings/cloudflare-main.gpg
    permissions: "0644"
    encoding: b64
    content: 
  - path: /usr/share/keyrings/githubcli-archive-keyring.gpg
    permissions: "0644"
    encoding: b64
    content: 

  # Defense in depth on top of key-only auth + the NSG /32: no passwords, no
  # root logins, no X11. (Written before sshd first starts on first boot.)
  - path: /etc/ssh/sshd_config.d/99-hardening.conf
    permissions: "0644"
    content: |
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      PermitRootLogin no
      X11Forwarding no

  # Idle watchdog: deallocate (compute billing stops, disk persists) after
  # IDLE_MINUTES with no user activity. Activity = any ssh session (pty via
  # `who`, or non-pty exec like a remote build — the "sshd: user@" match) OR
  # 1-min load >= LOAD_FLOOR (a detached/nohup'd build keeps the box alive).
  # Auth: managed-identity token from IMDS; the identity's custom role can
  # deallocate this VM and nothing else. All IDs come from IMDS — nothing
  # environment-specific is baked into this file.
  - path: /usr/local/sbin/devbox-idle-check
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      IDLE_MINUTES=30
      LOAD_FLOOR=0.5
      STAMP=/run/devbox-last-active

      # /run is tmpfs: first check after any boot starts the clock fresh
      [ -f "$STAMP" ] || { touch "$STAMP"; exit 0; }

      sessions=$({ who; pgrep -a 'sshd' | grep -E 'sshd[^ ]*: [^ ]+@' || true; } | wc -l)
      load=$(awk '{print $1}' /proc/loadavg)
      if [ "$sessions" -gt 0 ] || awk -v l="$load" -v f="$LOAD_FLOOR" 'BEGIN{exit !(l>=f)}'; then
        touch "$STAMP"
        exit 0
      fi

      age=$(( $(date +%s) - $(stat -c %Y "$STAMP") ))
      if [ "$age" -lt $(( IDLE_MINUTES * 60 )) ]; then
        echo "no activity for ${age}s (deallocate at $(( IDLE_MINUTES * 60 ))s)"
        exit 0
      fi

      imds() {
        curl -fsS -H Metadata:true \
          "http://169.254.169.254/metadata/instance/compute/$1?api-version=2021-02-01&format=text"
      }
      sub=$(imds subscriptionId); rg=$(imds resourceGroupName); vm=$(imds name)
      token=$(curl -fsS -H Metadata:true \
        'http://169.254.169.254/metadata/identity/oauth2/token?api-version=2018-02-01&resource=https%3A%2F%2Fmanagement.azure.com%2F' \
        | python3 -c 'import json,sys; print(json.load(sys.stdin)["access_token"])')

      echo "idle ${age}s >= ${IDLE_MINUTES}m: deallocating $vm"
      curl -fsS -X POST -d '' -H "Authorization: Bearer $token" \
        "https://management.azure.com/subscriptions/$sub/resourceGroups/$rg/providers/Microsoft.Compute/virtualMachines/$vm/deallocate?api-version=2023-09-01"

  - path: /etc/systemd/system/devbox-idle.service
    permissions: "0644"
    content: |
      [Unit]
      Description=Deallocate the devbox after 30 min without user activity
      After=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/sbin/devbox-idle-check

  - path: /etc/systemd/system/devbox-idle.timer
    permissions: "0644"
    content: |
      [Unit]
      Description=Run the devbox idle check every 5 minutes

      [Timer]
      OnBootSec=5min
      OnUnitActiveSec=5min

      [Install]
      WantedBy=timers.target

runcmd:
  - set -ex
  # oh-my-zsh for the ubuntu user (installer pinned to a commit, not master),
  # mirroring the local setup: gentoo theme, stock git plugin, then make zsh
  # the login shell
  - |
    sudo -iu ubuntu sh -c 'sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/e1d1f0dcd53d87096e5bfa48cb1c30d37cb7e5bf/tools/install.sh)" "" --unattended'
    sudo -iu ubuntu sed -i 's/^ZSH_THEME=.*/ZSH_THEME="gentoo"/' /home/ubuntu/.zshrc
    chsh -s /usr/bin/zsh ubuntu
  # linuxbrew bootstrap (installer pinned to a commit), package-empty by
  # design; shellenv into every shell init that might run a build — including
  # .zprofile, which oh-my-zsh leaves alone
  - |
    sudo -iu ubuntu bash <<'EOSU'
    set -euxo pipefail
    if [ ! -x /home/linuxbrew/.linuxbrew/bin/brew ]; then
      NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/99e13e96cbbdc1ac1ac09c0a40b450bf219ef3aa/install.sh)"
    fi
    for f in ~/.profile ~/.bashrc ~/.zprofile; do
      grep -qs 'linuxbrew.*shellenv' "$f" || echo 'eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"' >> "$f"
    done
    EOSU
  # box-level ccache policy (the shared cache serves every project)
  - sudo -Hu ubuntu ccache --set-config max_size=30G
  # the one directory convention every project relies on
  - install -d -o ubuntu -g ubuntu /home/ubuntu/projects
  - systemctl daemon-reload
  - systemctl enable --now devbox-idle.timer
  - touch /var/lib/cloud/instance/devbox-ready
